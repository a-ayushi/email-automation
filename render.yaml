services:
  - type: web
    name: email-outreach
    env: node
    plan: free
    nodeVersion: "20"
    buildCommand: npm ci --no-audit --no-fund && npm run build:backend
    startCommand: node dist/backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: NODE_OPTIONS
        value: --max-old-space-size=2048
